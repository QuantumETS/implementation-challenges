[project]
name = "qemcmc-mis"
version = "0.1.0"
description = "Toy quantum-enhanced MCMC workflow for Maximum Independent Set."
readme = "README.md"
requires-python = ">=3.11,<3.13"
dependencies = [
    "jupyter",
    "matplotlib",
    "networkx",
    "numpy",
    "pandas",
    "qiskit",
    "qiskit-aer",
    "tqdm",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[dependency-groups]
dev = ["pytest>=9.0.3", "ruff>=0.15.13"]

[tool.pytest]
pythonpath = ["src"]
